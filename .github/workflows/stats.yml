name: generate stats images

on:
  schedule:
    - cron: "5 0 * * *"

  workflow_dispatch:

  push:
    branches:
      - main

permissions:
  contents: write

defaults:
  run:
    shell: bash -euxo pipefail {0}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29  # v2 tag
      with:
        version: 0.16.0

    - name: build
      run: zig build

    - name: generate images
      run: |
        ./zig-out/bin/github-stats
      env:
        OVERVIEW_OUTPUT_FILE: dist/overview.svg
        LANGUAGES_OUTPUT_FILE: dist/languages.svg
        ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        EXCLUDE_REPOS: ${{ secrets.EXCLUDE_REPOS }}
        EXCLUDE_LANGS: ${{ secrets.EXCLUDE_LANGS }}
        EXCLUDE_PRIVATE: "false"
        SILENT: "true"
        # TODO: Remove this when they get their API working again
        # https://github.com/orgs/community/discussions/192970
        MAX_RETRIES: 5

    - name: deploy to stats branch
      uses: crazy-max/ghaction-github-pages@v5
      with:
        target_branch: stats
        build_dir: dist
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
